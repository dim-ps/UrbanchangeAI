name: grounded_sam

channels:
  - pytorch
  - nvidia
  - conda-forge
  - defaults

dependencies:
  - python=3.10
  - pip
  - numpy
  - pandas
  - pillow
  - matplotlib

  - pip:
      - torch
      - torchvision
      - transformers
      - accelerate
      - safetensors
      - opencv-python
      - pycocotools
      - supervision
      - hydra-core>=1.3.2
      - iopath>=0.1.10